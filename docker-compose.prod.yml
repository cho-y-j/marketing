services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketing_intelligence
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d marketing_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  api:
    image: ghcr.io/cho-y-j/marketing-api:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      # DB — Docker 내부 서비스명으로 연결
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-admin1234}@postgres:5432/marketing_intelligence
      MONGODB_URI: mongodb://mongodb:27017/marketing_intelligence
      REDIS_URL: redis://redis:6379
      # Naver
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      NAVER_SEARCHAD_API_KEY: ${NAVER_SEARCHAD_API_KEY}
      NAVER_SEARCHAD_SECRET_KEY: ${NAVER_SEARCHAD_SECRET_KEY}
      NAVER_SEARCHAD_CUSTOMER_ID: ${NAVER_SEARCHAD_CUSTOMER_ID}
      NAVER_OAUTH_CLIENT_ID: ${NAVER_OAUTH_CLIENT_ID}
      NAVER_OAUTH_CLIENT_SECRET: ${NAVER_OAUTH_CLIENT_SECRET}
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Auth
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      # Crypto
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Push
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@marketing.local}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      # 공공데이터
      TOURAPI_KEY: ${TOURAPI_KEY:-}
      TOURAPI_BASE: ${TOURAPI_BASE:-https://apis.data.go.kr/B551011/KorService2}
      KAMIS_KEY: ${KAMIS_KEY:-}
      KAMIS_ID: ${KAMIS_ID:-}

  web:
    image: ghcr.io/cho-y-j/marketing-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      API_URL: http://api:4000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NAVER_OAUTH_CLIENT_ID: ${NAVER_OAUTH_CLIENT_ID}
      NAVER_OAUTH_CLIENT_SECRET: ${NAVER_OAUTH_CLIENT_SECRET}

volumes:
  postgres_data:
  mongo_data:
